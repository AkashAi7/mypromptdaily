name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build distributions
        run: python -m pip install --upgrade pip ; python -m pip install build ; python -m build
        shell: pwsh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
